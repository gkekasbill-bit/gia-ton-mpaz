<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Η Σελίδα Μου</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        text-align: center;
        font-family: Arial, sans-serif;
        background-image: url("https://picsum.photos/1920/1080");
        background-size: cover;
        background-position: center;
        color: white;
    }

    h1 {
        font-size: 50px;
        animation: blink 1s infinite;
        text-shadow: 2px 2px 10px black;
    }

    @keyframes blink {
        0% { opacity: 1; }
        50% { opacity: 0; }
        100% { opacity: 1; }
    }

    p {
        font-size: 26px;
        margin-bottom: 20px;
        text-shadow: 2px 2px 10px black;
    }

    button {
        padding: 12px 25px;
        font-size: 18px;
        border: none;
        border-radius: 8px;
        background-color: #ff4081;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background-color: #e6005c;
        transform: scale(1.1);
    }
</style>
</head>

<body>

<h1>αγαπω ΤΗΝ ΚΟΡΤΕΣΣΑ</h1>
<p>μπαζακα εισαι αδερφοσ μοθ</p>

<button onclick="showMessage()">Πάτα με</button>

<script>
function showMessage() {
    alert("🔥 Surprise! Η σελίδα δουλεύει τέλεια!");
}
</script>

</body>
</html>
